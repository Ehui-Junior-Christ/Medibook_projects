<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MediBook - Rappels</title>
  <link rel="stylesheet" href="../../css/main.css">
  <link rel="stylesheet" href="../../css/patient.css">
  <script defer src="../../js/entry-guard.js"></script>
  <script defer src="../../js/patient.js"></script>
</head>
<body>
<div class="app-shell">
  <aside class="sidebar">
    <div class="sb-logo">
      <div class="sb-logo-inner">
        <div class="sb-logo-mark">🏥</div>
        <div>
          <div class="sb-logo-text">MediBook</div>
          <div class="sb-logo-sub">Portail medical</div>
        </div>
      </div>
    </div>
    <div class="sb-role-badge sb-role-patient"><span>🧑</span><span>Patient</span></div>
    <nav data-patient-nav></nav>
    <div class="sb-footer">
      <a class="sb-user" href="profil.html#edit-profile">
        <div class="sb-avatar" data-patient-initials>BS</div>
        <div>
          <div class="sb-user-name" data-patient-name>Patient</div>
          <div class="sb-user-role">Profil et sante</div>
        </div>
        <span class="sb-user-link">↗</span>
      </a>
    </div>
  </aside>

  <main class="main">
    <header class="topbar">
      <div class="topbar-title">Mes rappels</div>
      <div class="topbar-spacer"></div>
      <div class="topbar-right">
        <a class="icon-btn logout" href="../login.html" title="Deconnexion">🚪</a>
      </div>
    </header>

    <div class="content-area">
      <section class="card">
        <div class="card-header">
          <div class="card-title">Suivi et rappels</div>
        </div>
        <div data-rappels-list></div>
      </section>
    </div>
  </main>
</div>
</body>
</html>
