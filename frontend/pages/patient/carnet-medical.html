<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MediBook - Carnet medical</title>
  <link rel="stylesheet" href="../../css/main.css">
  <link rel="stylesheet" href="../../css/patient.css">
  <script defer src="../../js/entry-guard.js"></script>
  <script defer src="../../js/patient.js"></script>
</head>
<body>
<div class="app-shell">
  <aside class="sidebar">
    <div class="sb-logo">
      <div class="sb-logo-inner">
        <div class="sb-logo-mark">🏥</div>
        <div>
          <div class="sb-logo-text">MediBook</div>
          <div class="sb-logo-sub">Portail medical</div>
        </div>
      </div>
    </div>
    <div class="sb-role-badge sb-role-patient"><span>🧑</span><span>Patient</span></div>
    <nav data-patient-nav></nav>
    <div class="sb-footer">
      <a class="sb-user" href="profil.html#edit-profile">
        <div class="sb-avatar" data-patient-initials>BS</div>
        <div>
          <div class="sb-user-name" data-patient-name>Patient</div>
          <div class="sb-user-role">Mettre a jour mon dossier</div>
        </div>
        <span class="sb-user-link">↗</span>
      </a>
    </div>
  </aside>

  <main class="main">
    <header class="topbar">
      <div class="topbar-title">Carnet medical</div>
      <div class="topbar-spacer"></div>
      <div class="topbar-right">
        <a class="icon-btn logout" href="../login.html" title="Deconnexion">🚪</a>
      </div>
    </header>

    <div class="content-area">
      <section class="card">
        <div class="card-header">
          <div class="card-title">Constantes personnelles</div>
        </div>
        <div class="vital-grid" data-carnet-vitals></div>
      </section>

      <section class="carnet-grid">
        <div class="stack">
          <article class="card profile-section-card">
            <div class="card-header">
              <div class="card-title">Allergies</div>
            </div>
            <div data-carnet-allergies></div>
          </article>

          <article class="card profile-section-card">
            <div class="card-header">
              <div class="card-title">Antecedents et traitements</div>
            </div>
            <div data-carnet-antecedents></div>
          </article>
        </div>

        <article class="card profile-section-card">
          <div class="card-header">
            <div class="card-title">Historique medical</div>
          </div>
          <div class="timeline-list" data-carnet-history></div>
        </article>
      </section>
    </div>
  </main>
</div>
</body>
</html>
