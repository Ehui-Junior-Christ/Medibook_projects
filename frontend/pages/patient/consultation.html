<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MediBook - Consultations</title>
  <link rel="stylesheet" href="../../css/main.css">
  <link rel="stylesheet" href="../../css/patient.css">
  <script defer src="../../js/entry-guard.js"></script>
  <script defer src="../../js/patient.js"></script>
</head>
<body>
<div class="app-shell">
  <aside class="sidebar">
    <div class="sb-logo">
      <div class="sb-logo-inner">
        <div class="sb-logo-mark">🏥</div>
        <div>
          <div class="sb-logo-text">MediBook</div>
          <div class="sb-logo-sub">Portail medical</div>
        </div>
      </div>
    </div>
    <div class="sb-role-badge sb-role-patient"><span>🧑</span><span>Patient</span></div>
    <nav data-patient-nav></nav>
    <div class="sb-footer">
      <a class="sb-user" href="profil.html#edit-profile">
        <div class="sb-avatar" data-patient-initials>BS</div>
        <div>
          <div class="sb-user-name" data-patient-name>Patient</div>
          <div class="sb-user-role">Mon profil</div>
        </div>
        <span class="sb-user-link">↗</span>
      </a>
    </div>
  </aside>

  <main class="main">
    <header class="topbar">
      <div class="topbar-title">Mes consultations</div>
      <div class="topbar-spacer"></div>
      <div class="topbar-right">
        <div class="helper-copy" data-consultation-count>0 consultation</div>
        <a class="icon-btn logout" href="../login.html" title="Deconnexion">🚪</a>
      </div>
    </header>

    <div class="content-area">
      <section class="card">
        <div class="filter-row">
          <button class="chip sel" type="button" data-filter="toutes">Toutes</button>
          <button class="chip" type="button" data-filter="terminee">Terminees</button>
          <button class="chip" type="button" data-filter="avenir">A venir</button>
          <div class="searchbar">
            <span>🔎</span>
            <input type="text" placeholder="Rechercher une consultation..." data-consultation-search>
          </div>
        </div>
        <div data-consultation-list></div>
      </section>
    </div>
  </main>
</div>

<div class="overlay" data-consultation-modal>
  <div class="modal">
    <div class="modal-title" data-modal-title>Consultation</div>
    <div class="modal-sub" data-modal-date>Date</div>
    <div class="info-stack">
      <div>
        <strong>Medecin</strong>
        <p data-modal-medecin></p>
      </div>
      <div>
        <strong>Symptomes</strong>
        <p data-modal-symptomes></p>
      </div>
      <div>
        <strong>Diagnostic</strong>
        <p data-modal-diagnostic></p>
      </div>
      <div>
        <strong>Traitement</strong>
        <p data-modal-traitement></p>
      </div>
      <div>
        <strong>Observations</strong>
        <p data-modal-observations></p>
      </div>
      <div>
        <strong>Documents lies</strong>
        <p data-modal-documents></p>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" type="button" data-close-consultation-modal>Fermer</button>
    </div>
  </div>
</div>
</body>
</html>
